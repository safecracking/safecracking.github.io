<header class="header">
    <a href="/" title="Back to Home">
        <img src="open.png" alt="Safe Cracking logo" class="logo">
    </a>
    <div class="title">Welcome to the Safe Cracking Hall of Fame!</div>

    <div class="container">


<!-- Hall of Fame list (always visible below) -->
<div id="hall" class="hall">
    <h2 style="margin-bottom: 6px; color: #a78bfa; font-size: 2.2rem;">🏆Hall of Fame🏆</h2>

<div style="font-size:0.95rem;color:#a0a0cc;margin-bottom:16px;">
    Ranking of our Champions.<br>
⏱ means the game time until reaching 1,000,000 coins (fixed),<br>
💰 means the player's current number of coins.
</div>

    <div style="margin-bottom:28px;">
    <button id="sort-btn" class="sort-btn">
        Sort by Coins 💰
    </button>
</div>

    <div class="hall-list" id="hall-list">
        <p>Loading participants...</p>
    </div>
</div>


<footer>
    <p>© Safe Cracking<a href="https://play.google.com/store/apps/details?id=com.scg.safecrackergame" class="external" target="_blank"></a> 2026 | Official site</p>
    Check our <a href="/privacy">Privacy Policy</a>.
</footer>
<script>

const db = firebase.database();

let players = [];
let sortMode = "time";

const container = document.getElementById("hall-list");
const sortBtn = document.getElementById("sort-btn");

db.ref("records").once("value").then(snapshot => {

    const data = snapshot.val();

    if (!data) {
        container.innerHTML = "<p>No participants yet.</p>";
        return;
    }

    players = Object.values(data);

    renderPlayers();

});

sortBtn.addEventListener("click", () => {

    if (sortMode === "time") {
        sortMode = "coins";
        sortBtn.textContent = "Sort by Time ⏱";
    } else {
        sortMode = "time";
        sortBtn.textContent = "Sort by Coins 💰";
    }

    renderPlayers();

});

function renderPlayers() {

    container.innerHTML = "";

    let sorted = [...players];

    if (sortMode === "time") {
        sorted.sort((a,b) => a.timeMillis - b.timeMillis);
    } else {
        sorted.sort((a,b) => b.coins - a.coins);
    }

    sorted.forEach((player, index) => {

        const name = player.nickname || "Anonymous";
        const country = player.country || "";
        const coins = player.coins || 0;
        const link = player.profileLink || "";

        const time = formatTime(player.timeMillis);

        let displayName = name;

        if (link) {
            let url = link;
            if (!url.startsWith("http")) {
                url = "https://" + url;
            }
            displayName = `<a href="${url}" target="_blank">${name}</a>`;
        }

        const div = document.createElement("div");
        div.className = "player";

        div.innerHTML =
    `<strong>${index + 1}.</strong> ` +
    displayName +
    ` <span class="country">(${country})</span>` +
    `<br>⏱ ${time} | 💰 ${coins.toLocaleString()}`;

        container.appendChild(div);

    });

}

function formatTime(ms) {

    const h = Math.floor(ms / 3600000);
    const m = Math.floor(ms % 3600000 / 60000);
    const s = Math.floor(ms % 60000 / 1000);

    return h.toString().padStart(2,"0") + ":" +
           m.toString().padStart(2,"0") + ":" +
           s.toString().padStart(2,"0");
}

</script>
